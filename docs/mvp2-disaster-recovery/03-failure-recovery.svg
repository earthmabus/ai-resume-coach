<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900"><rect width="1600" height="900" fill="#f8fafc"/><text x="80" y="90" font-family="Arial" font-size="48" font-weight="700" fill="#17233c">Certified Failure and Recovery Envelope</text><text x="80" y="135" font-family="Arial" font-size="24" fill="#4a5872">What MR-014 proved — and what remains intentionally manual</text><rect x="80" y="210" width="680" height="560" rx="28" fill="#edf8f1" stroke="#388a5b" stroke-width="4"/><text x="125" y="270" font-family="Arial" font-size="34" font-weight="700" fill="#246443">Certified</text><text x="125" y="330" font-family="Arial" font-size="25" fill="#173b2a">✓ Either routing site can be isolated</text><text x="125" y="385" font-family="Arial" font-size="25" fill="#173b2a">✓ Global API converges to survivor</text><text x="125" y="440" font-family="Arial" font-size="25" fill="#173b2a">✓ Authenticated work continues</text><text x="125" y="495" font-family="Arial" font-size="25" fill="#173b2a">✓ Owner-region semantics remain correct</text><text x="125" y="550" font-family="Arial" font-size="25" fill="#173b2a">✓ Worker backlog remains durable</text><text x="125" y="605" font-family="Arial" font-size="25" fill="#173b2a">✓ Duplicate submission is idempotent</text><text x="125" y="660" font-family="Arial" font-size="25" fill="#173b2a">✓ Restoration completes and queue drains</text><rect x="840" y="210" width="680" height="560" rx="28" fill="#fff4ea" stroke="#b86c2f" stroke-width="4"/><text x="885" y="270" font-family="Arial" font-size="34" font-weight="700" fill="#8c4a18">Accepted boundaries</text><text x="885" y="330" font-family="Arial" font-size="25" fill="#54321a">• No automatic ownership reassignment</text><text x="885" y="385" font-family="Arial" font-size="25" fill="#54321a">• No cross-region queue draining</text><text x="885" y="440" font-family="Arial" font-size="25" fill="#54321a">• No automatic terminal replay</text><text x="885" y="495" font-family="Arial" font-size="25" fill="#54321a">• No zero-interruption guarantee</text><text x="885" y="550" font-family="Arial" font-size="25" fill="#54321a">• No contractual RTO/RPO claim</text><text x="885" y="605" font-family="Arial" font-size="25" fill="#54321a">• Production hardening remains separate</text><text x="80" y="840" font-family="Arial" font-size="26" font-weight="700" fill="#17233c">Final status: implemented • documented • operable • runtime-certified</text></svg>