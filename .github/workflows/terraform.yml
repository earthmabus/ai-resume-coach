name: Terraform

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "src/**"
      - "tests/**"
      - "frontend/**"
      - "lambda_layer/**"
      - ".github/workflows/terraform.yml"

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::940827434048:role/GitHubActionsTerraformRole-ai-resume-coach
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  TF_VAR_deployment_id: ${{ github.sha }}
  TF_VAR_analysis_provider: openai
  TF_VAR_openai_model: ${{ secrets.OPENAI_MODEL }}
  TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
  TF_VAR_registration_notification_email: ${{ secrets.REGISTRATION_NOTIFICATION_EMAIL }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    name: Test, Plan, and Apply
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            lambda_layer/requirements.txt

      - name: Install test dependencies
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest boto3
          python -m pip install -r lambda_layer/requirements.txt

      - name: Compile Python source
        working-directory: ${{ github.workspace }}
        run: python -m compileall src

      - name: Run unit tests
        working-directory: ${{ github.workspace }}
        run: pytest -q

      - name: Build PDF Lambda layer
        working-directory: ${{ github.workspace }}
        run: python tools/build/pdf_dependency_layer.py

      - name: Build Lambda packages
        working-directory: ${{ github.workspace }}
        run: python tools/build/lambda_packages.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Generate frontend runtime configuration
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          API_ENDPOINT="$(terraform -chdir=infra output -json primary_frontend_site | jq -r '.api_endpoint')"
          USER_POOL_ID="$(terraform -chdir=infra output -raw cognito_user_pool_id)"
          USER_POOL_CLIENT_ID="$(terraform -chdir=infra output -raw cognito_user_pool_client_id)"

          cat > frontend/config.js <<EOF
          window.APP_CONFIG = {
            apiEndpoint: "${API_ENDPOINT}",
            cognitoUserPoolId: "${USER_POOL_ID}",
            cognitoUserPoolClientId: "${USER_POOL_CLIENT_ID}"
          };
          EOF

      - name: Deploy frontend to S3
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          FRONTEND_BUCKET="$(terraform -chdir=infra output -raw frontend_bucket_name)"
          aws s3 sync frontend/ "s3://${FRONTEND_BUCKET}/" --delete

      - name: Invalidate CloudFront cache
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          DISTRIBUTION_ID="$(terraform -chdir=infra output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Display deployment URLs
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          echo "Frontend URL: $(terraform -chdir=infra output -raw frontend_url)"
          echo "CloudFront domain: https://$(terraform -chdir=infra output -raw cloudfront_distribution_domain_name)"
          echo "Primary API: $(terraform -chdir=infra output -json primary_frontend_site | jq -r '.api_endpoint')"
          echo "Regional APIs:"
          terraform -chdir=infra output -json regional_api_endpoints | jq .
