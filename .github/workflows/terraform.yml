name: Terraform

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "src/**"
      - "frontend/**"
      - "lambda_layer/**"
      - ".github/workflows/terraform.yml"

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::940827434048:role/GitHubActionsTerraformRole-ai-resume-coach
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform Plan and Apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build PDF Lambda layer
        working-directory: ${{ github.workspace }}
        run: |
          rm -rf lambda_layer/build
          mkdir -p lambda_layer/build/python
          python -m pip install --upgrade pip
          python -m pip install -r lambda_layer/requirements.txt -t lambda_layer/build/python

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
