<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI Resume Coach</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>AI Resume Coach</h1>
      <p>Analyze resume content and receive leadership-focused improvement recommendations.</p>
    </section>

    <section class="card">
      <label for="resumeText">Resume text</label>
      <textarea id="resumeText" rows="12" placeholder="Paste resume text here..."></textarea>

      <button id="analyzeButton">Analyze Resume</button>

      <pre id="result">Results will appear here.</pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
