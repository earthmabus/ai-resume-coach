<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI Resume Coach</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>AI Resume Coach</h1>
      <p>Analyze resume content, upload PDFs, and review past analysis results.</p>
    </section>

    <section class="grid">
      <section class="card">
        <h2>Analyze Resume Text</h2>
        <label for="resumeText">Resume text</label>
        <textarea id="resumeText" rows="12" placeholder="Paste resume text here..."></textarea>
        <button id="analyzeButton">Analyze Text</button>
      </section>

      <section class="card">
        <h2>Upload Resume PDF</h2>
        <label for="resumeFile">PDF file</label>
        <input id="resumeFile" type="file" accept="application/pdf" />
        <button id="uploadButton">Upload PDF</button>
        <p class="hint">PDFs are uploaded to S3, converted to text, analyzed, and saved to history.</p>
      </section>
    </section>

    <section class="card">
      <h2>Latest Result</h2>

      <div id="result" class="result-panel">
        Results will appear here.
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Analysis History</h2>
        <button id="refreshHistoryButton">Refresh History</button>
      </div>
      <div id="history" class="history">No history loaded.</div>
    </section>
  </main>

  <script src="./app.js"></script>
  <script src="./config.js"></script>
</body>
</html>
