<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Confirm Account | AI Resume Coach</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container auth-container">
    <section class="card auth-card">
      <h1>Confirm Account</h1>

      <label for="confirmEmail">Email</label>
      <input id="confirmEmail" type="email" autocomplete="email" />

      <label for="confirmCode">Confirmation Code</label>
      <input id="confirmCode" type="text" />

      <button id="confirmButton" class="primary-button" type="button">Confirm Account</button>

      <div class="auth-actions">
	<a class="secondary-button" href="./login.html">Back to Sign In</a>
	<a class="secondary-button" href="./signup.html">Create New Account</a>
      </div>

      <div id="confirmResult" class="result-panel">Enter your confirmation code.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.15/dist/amazon-cognito-identity.min.js"></script>
  <script src="./config.js?v=2"></script>
  <script src="./auth.js?v=2"></script>
  <script src="./confirm-account.js?v=2"></script>
</body>
</html>
