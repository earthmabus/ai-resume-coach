<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login | AI Resume Coach</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>AI Resume Coach</h1>

      <h2>Sign In</h2>
      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" />

      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" />

      <button id="loginButton">Sign In</button>

      <hr />

      <h2>Create Account</h2>
      <label for="signupEmail">Email</label>
      <input id="signupEmail" type="email" />

      <label for="signupPassword">Password</label>
      <input id="signupPassword" type="password" />

      <button id="signupButton">Sign Up</button>

      <hr />

      <h2>Confirm Account</h2>
      <label for="confirmEmail">Email</label>
      <input id="confirmEmail" type="email" />

      <label for="confirmCode">Confirmation Code</label>
      <input id="confirmCode" type="text" />

      <button id="confirmButton">Confirm</button>

      <div id="authResult" class="result-panel">Enter your credentials.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.15/dist/amazon-cognito-identity.min.js"></script>
  <script src="./config.js"></script>
  <script src="./auth.js"></script>
  <script src="./login.js"></script>
</body>
</html>
