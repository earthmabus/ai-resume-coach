<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login | AI Resume Coach</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container auth-container">
    <section class="card auth-card">
      <h1>AI Resume Coach</h1>

      <h2>Sign In</h2>

      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" autocomplete="email" />

      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" autocomplete="current-password" />

      <button id="loginButton" class="primary-button">Sign In</button>

      <div class="auth-button-separator"></div>

      <div class="auth-actions">
        <button
          type="button"
          class="secondary-button"
          onclick="window.location.href='./signup.html'">
          Create New Account
        </button>

        <button
          type="button"
          class="secondary-button"
          onclick="window.location.href='./confirm-account.html'">
          Confirm New Account
        </button>
      </div>

      <div id="authResult" class="result-panel">Enter your credentials.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.15/dist/amazon-cognito-identity.min.js"></script>
  <script src="./config.js?v=2"></script>
  <script src="./auth.js?v=2"></script>
  <script src="./login.js?v=2"></script>
</body>
</html>
